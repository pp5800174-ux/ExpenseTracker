<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF=8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Expense Tracker Dashboard</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
    <div class="dashboard">
        <h1>Expense Tracker</h1>
        <div class="card">
            <h3>Total income</h3>
            <p>25,000</p>
        </div>
        <div class="card">
            <h3>Total Expense</h3>
            <p>10,000</p>
        </div>
        <div class="card">
            <h3>Balance</h3>
            <p>15000</p>
        </div>
    </div>
    <div class="button">
        <button onclick="window.location.href='add_expense.html'">
            add income
        </button>
        <button onclick="window.location.href='add_expense.html'">
            add expense
        </button>
    </div>
    <h2>Recent Transactions</h2>
    <table>
        <tr>
            <th>date</th>
            <th>category</th>
            <th>amount</th>
        </tr>
        <tr>
            <td>20-06-2026</td>
            <td>food</td>
            <td>500</td>
        </tr>
        <tr>
            <td>21-6-2026</td>
            <td>travel</td>
            <td>300</td>
        </tr>
    </table>
</div>
</body>
</html>
